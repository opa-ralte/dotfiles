[manager]
ratio          = [1, 2, 3]   # sidebar : parent : preview column widths
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = false
show_symlink   = true

[preview]
tab_size   = 2
max_width  = 600
max_height = 900

[opener]

# ── Text / code ────────────────────────────────────────────────────────────────
edit = [
  { run = 'nvim "$@"', block = true, desc = "nvim" },
]

# ── PDFs ───────────────────────────────────────────────────────────────────────
pdf = [
  { run = 'firefox "$@"', orphan = true, desc = "Firefox" },
]

# ── Images ─────────────────────────────────────────────────────────────────────
image = [
  { run = 'feh "$@"',              orphan = true, desc = "feh"    },
  { run = 'gimp "$@"',             orphan = true, desc = "GIMP"   },
]

# ── Video ──────────────────────────────────────────────────────────────────────
video = [
  { run = 'mpv "$@"', orphan = true, desc = "mpv" },
]

# ── Audio ──────────────────────────────────────────────────────────────────────
audio = [
  { run = 'mpv "$@"', orphan = true, desc = "mpv" },
]

# ── Archives ───────────────────────────────────────────────────────────────────
archive = [
  { run = 'aunpack "$@"', desc = "atool (extract here)" },
]

# ── Fallback ───────────────────────────────────────────────────────────────────
open = [
  { run = 'xdg-open "$@"', orphan = true, desc = "xdg-open (system default)" },
]

[open]
rules = [
  # Directories
  { mime = "inode/directory", use = "edit" },

  # Text / code – match common mime types and common extensions
  { mime = "text/*",                     use = ["edit", "open"] },
  { mime = "application/json",           use = ["edit", "open"] },
  { mime = "application/javascript",     use = ["edit", "open"] },
  { mime = "application/x-shellscript",  use = ["edit", "open"] },
  { mime = "application/xml",            use = ["edit", "open"] },
  { mime = "application/toml",           use = ["edit", "open"] },
  { mime = "application/x-yaml",         use = ["edit", "open"] },

  # PDFs
  { mime = "application/pdf", use = ["pdf", "open"] },

  # Images
  { mime = "image/*", use = ["image", "open"] },

  # Video
  { mime = "video/*", use = ["video", "open"] },

  # Audio
  { mime = "audio/*", use = ["audio", "open"] },

  # Archives
  { mime = "application/zip",              use = ["archive", "open"] },
  { mime = "application/x-tar",            use = ["archive", "open"] },
  { mime = "application/x-bzip2",          use = ["archive", "open"] },
  { mime = "application/gzip",             use = ["archive", "open"] },
  { mime = "application/x-xz",            use = ["archive", "open"] },
  { mime = "application/x-7z-compressed", use = ["archive", "open"] },
  { mime = "application/x-rar",           use = ["archive", "open"] },
  { mime = "application/zstd",            use = ["archive", "open"] },

  # Everything else → system default
  { mime = "*", use = "open" },
]
